<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Clash - Pair Cast</title>
    <style>
        body {
            font-family: Inter, system-ui, sans-serif;
            background: #0a0a0a;
            color: #e4e4e7;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: #111113;
            border: 1px solid #27272a;
            border-radius: 24px;
            padding: 28px;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin: 0 0 8px; }
        p { color: #a1a1aa; font-size: 0.95rem; line-height: 1.5; }
        input {
            width: 100%;
            margin-top: 16px;
            padding: 12px 14px;
            font-size: 1.25rem;
            letter-spacing: 0.2em;
            text-align: center;
            text-transform: uppercase;
            background: #18181b;
            border: 1px solid #3f3f46;
            border-radius: 14px;
            color: #fafafa;
        }
        button {
            margin-top: 14px;
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: none;
            border-radius: 14px;
            background: #059669;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
        .err { color: #f87171; font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Claim Clash Cast</h1>
        <p>Enter the pairing code shown on your computer in the Cast to TV window.</p>
        <input id="pair-input" maxlength="12" autocomplete="off" placeholder="PAIRING CODE" />
        <button type="button" id="pair-btn">Connect</button>
        <p id="pair-err" class="err"></p>
    </div>
    <script>
        function connect() {
            const code = (document.getElementById('pair-input').value || '').trim();
            if (!code) {
                document.getElementById('pair-err').textContent = 'Enter the pairing code from your PC.';
                return;
            }
            window.location.href = '/?token=' + encodeURIComponent(code);
        }
        document.getElementById('pair-btn').addEventListener('click', connect);
        document.getElementById('pair-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') connect();
        });
    </script>
</body>
</html>
